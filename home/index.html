<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justin's Space</title>
    <link rel="stylesheet" href="css/mystyle.css">
    <style>
        /* Inline debug CSS to ensure full control */
        .about-section {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 400px; /* Explicitly set height for debugging */
            background-color: #1e1e1e;
            border: 1px solid #3c3f41;
            border-radius: 5px;
            overflow: hidden; /* Prevent overflow issues */
        }

        .about-section .about-gif {
            width: 100%; /* Full width of container */
            height: 100%; /* Full height of container */
            object-fit: cover; /* Ensures the GIF fills the space */
            display: block; /* Make it display as a block element */
        }
    </style>
</head>
<body>
    <header class="header">
        <img src="Untitled-1.gif" alt="Heading GIF" class="header-gif">
    </header>

    <section class="social-icons">
        <a href="#" class="icon steam" title="Steam"><img src="steam.png" alt="Steam"></a>
        <a href="#" class="icon instagram" title="Instagram"><img src="insta_icon.png" alt="Instagram"></a>
        <a href="#" class="icon github" title="GitHub"><img src="github_icon.png" alt="GitHub"></a>
    </section>

    <section class="main-content">
        <div class="about-section">
            <img src="Untitled-2.gif" alt="About Me GIF" class="about-gif">
        </div>

        <div class="gallery">
            <h2>Picture Gallery</h2>
            <div class="gallery-container">
                <button class="gallery-nav left">&lt;</button>
                <div class="gallery-display">[DISPLAY]</div>
                <button class="gallery-nav right">&gt;</button>
            </div>
        </div>
    </section>

    <section class="animation-demos">
        <h2>Animation Demos</h2>
        <div class="demo-container">
            <!-- Animation content here -->
        </div>
    </section>

    <section class="comment-box">
        <h2>Comments</h2>
        <textarea placeholder="Leave your comment here..."></textarea>
        <button>Submit</button>
    </section>

    <script src="js/myScript.js"></script>
</body>
</html>
